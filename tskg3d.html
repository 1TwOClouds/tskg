<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>GIS高压开关3D</title>
  <style>
    body { margin: 0; background: linear-gradient(135deg, #2c3e50, #000000); }
    canvas { display: block; }
    /* 加载进度条样式 */
    #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-size: 18px; }
  </style>
</head>
<body>
<div id="loading">模型加载中... 0%</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 10000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;

scene.add(new THREE.AmbientLight(0xffffff, 2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10,10,10);
scene.add(dirLight);

const loadingText = document.getElementById('loading');
const loader = new OBJLoader();

// 带加载进度的模型加载
loader.load('1.obj', (object) => {
  loadingText.style.display = 'none';
  object.traverse((child) => {
    if(child.isMesh) child.material = new THREE.MeshStandardMaterial({
      color: 0xEEEEEE, metalness:0.2, roughness:0.7
    });
  });

  const box = new THREE.Box3().setFromObject(object);
  const center = box.getCenter(new THREE.Vector3());
  const maxSize = box.getSize(new THREE.Vector3()).length();
  object.scale.multiplyScalar(3/maxSize);
  object.position.sub(center.multiplyScalar(3/maxSize));

  scene.add(object);
  camera.position.z = 5;
}, (xhr) => {
  // 实时显示加载进度
  const percent = Math.round((xhr.loaded / xhr.total) * 100);
  loadingText.innerText = `模型加载中... ${percent}%`;
});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
})
</script>
</body>
</html>
